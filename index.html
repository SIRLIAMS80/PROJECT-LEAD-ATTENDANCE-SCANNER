<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PROJECT-LEAD-QR-ATTENDANCE-SCANNER </title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
    #reader {
      width: 100%;
      margin-bottom: 10px;
    }
    button {
      padding: 10px;
      background: blue;
      color: white;
      border: none;
      width: 100%;
      border-radius: 5px;
    }
    #status {
      margin: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>
<div class="container">
  <h2>📷 PROJECT-LEAD-QR-ATTENDANCE-SCANNER</h2>

  <div id="reader"></div>

  <p id="next">Next: Time-In</p>
  <p id="status">Waiting...</p>

  <button onclick="startScanner()">Start Scanner</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxxrcO0_G7l4mIadbS__3Yej_IbVrTGDmJxEuozLSpff1SY2TsMWHyAfF0yrDaWn_F5/exec"; // ✅ put your Apps Script URL

const actions = ["Time-In", "Break-Out", "Break-In", "Time-Out"];
let logs = {};
let scanner;

function vibrate() {
  if (navigator.vibrate) navigator.vibrate(200);
}

// ✅ AUTO START when page loads
window.onload = function () {
  startScanner();
};

function startScanner() {
  scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {
    if (devices && devices.length) {
      // ✅ Use back camera
      const cameraId = devices[devices.length - 1].id;

      scanner.start(
        cameraId,
        {
          fps: 10,
          qrbox: 250
        },
        onScan
      );
    } else {
      alert("❌ No camera found");
    }
  }).catch(err => {
    alert("❌ Camera error: " + err);
  });
}

function onScan(decodedText) {
  const today = new Date().toISOString().split("T")[0];
  const key = decodedText + "_" + today;

  if (!logs[key]) logs[key] = [];

  if (logs[key].length >= 4) {
    document.getElementById("status").innerText =
      "✅ Completed: " + decodedText;
    return;
  }

  const action = actions[logs[key].length];
  logs[key].push(action);

  document.getElementById("next").innerText =
    "Next: " + (actions[logs[key].length] || "✅ Done");

  document.getElementById("status").innerText =
    decodedText + " - " + action;

  vibrate();

  // ✅ SEND TO GOOGLE SHEETS
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      qrData: decodedText,
      action: action,
      timestamp: new Date().toISOString()
    })
  })
  .then(() => {
    document.getElementById("status").innerText += " ✅ Saved";
  })
  .catch(() => {
    document.getElementById("status").innerText += " ❌ Offline";
  });
}
</script>
